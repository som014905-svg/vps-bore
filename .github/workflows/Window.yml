- name: Khởi chạy Ngrok và lấy thông tin
        shell: powershell
        run: |
          # Chạy Ngrok ở chế độ nền
          Start-Process ./ngrok/ngrok.exe -ArgumentList 'tcp 3389'
          
          # Đợi Ngrok khởi tạo API (thay vì chạy song song, ta đợi ở đây)
          Write-Host "Đang khởi động Ngrok, vui lòng đợi..."
          $retry = 0
          while ($retry -lt 15) {
            try {
              $url = (Invoke-RestMethod http://localhost:4040/api/tunnels).tunnels[0].public_url
              if ($url) {
                Write-Host "========================================"
                Write-Host "Kết nối qua: mstsc"
                Write-Host "Địa chỉ: $url"
                Write-Host "User: runneradmin"
                Write-Host "Pass: YourPassword123!"
                Write-Host "========================================"
                return
              }
            } catch {
              Start-Sleep -Seconds 3
              $retry++
            }
          }
          Write-Error "Không thể kết nối tới Ngrok sau nhiều lần thử!"
          exit 1